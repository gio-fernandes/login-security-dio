name: .NET Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restaurar dependências
        run: dotnet restore LoginSecurity.sln

      - name: Compilar solução
        run: dotnet build LoginSecurity.sln --no-restore --configuration Release

      - name: Executar testes
        run: dotnet test LoginSecurity.sln --no-build --configuration Release --verbosity normal